<!DOCTYPE html>
<html>
<head>
  <title>Audio Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    body { background: black; color: #ffaa00; font-family: monospace; padding: 40px; }
    button { padding: 20px 40px; font-size: 16px; cursor: pointer; background: transparent; color: #ffaa00; border: 1px solid #ffaa00; }
    #log { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>TONE.JS AUDIO TEST</h1>
  <button id="btn">[ TEST AUDIO ]</button>
  <div id="log"></div>
  
  <script>
    const log = (msg) => {
      console.log(msg);
      document.getElementById('log').innerHTML += msg + '\n';
    };
    
    document.getElementById('btn').onclick = async () => {
      log('=== BUTTON CLICKED ===');
      
      try {
        log('1. Starting Tone...');
        await Tone.start();
        log('2. Tone state: ' + Tone.context.state);
        
        log('3. Creating sampler...');
        const sampler = new Tone.Sampler({
          urls: { A4: "mydesk/Voice/Voice1.wav" },
          baseUrl: "samples/",
          onload: () => {
            log('4. Sampler loaded!');
            log('5. Triggering note...');
            sampler.triggerAttackRelease("A4", 1);
            log('6. Note triggered - you should hear sound!');
          },
          onerror: (e) => log('Sampler error: ' + e)
        }).toDestination();
        
      } catch (err) {
        log('ERROR: ' + err.message);
      }
    };
  </script>
</body>
</html>
